<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Backbone</title>
<style>
:root{--bg:#0e1116;--card:#171c24;--card2:#1d2330;--line:#262d39;--txt:#e6e9ef;--dim:#8b94a7;
--green:#3fb96a;--amber:#e0a93e;--red:#e0563e;--blue:#4f8ef7;--purple:#9b74f7;}
*{box-sizing:border-box;margin:0}
body{background:var(--bg);color:var(--txt);font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding-bottom:60px}
header{position:sticky;top:0;background:rgba(14,17,22,.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:10px 16px;display:flex;gap:8px;align-items:center;z-index:10}
header h1{font-size:15px;font-weight:700;margin-right:4px;letter-spacing:-.01em}
nav a{color:var(--dim);text-decoration:none;padding:5px 11px;border-radius:7px;font-size:13.5px;transition:.15s}
nav a.on{color:var(--txt);background:var(--card)}
nav a:hover:not(.on){color:var(--txt)}
#who{margin-left:auto;color:var(--dim);font-size:12px;white-space:nowrap}
main{max-width:1400px;margin:0 auto;padding:14px 14px 0}
.card{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:12px 14px;margin-bottom:9px;transition:.15s border-color}
.card.linked{cursor:pointer}.card.linked:hover{border-color:var(--blue)}
.card h3{font-size:13.5px;font-weight:600;margin-bottom:3px;line-height:1.35}
.meta{color:var(--dim);font-size:12px;display:flex;gap:9px;flex-wrap:wrap;margin-top:4px;align-items:center}
.sec{margin:18px 0 7px;font-size:11.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);font-weight:600}
.dot{display:inline-block;width:8px;height:8px;border-radius:4px;margin-right:7px;flex-shrink:0}
.p-urgent{background:var(--red)}.p-high{background:var(--amber)}.p-medium{background:var(--blue)}.p-low{background:var(--dim)}
.chip{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11.5px;border:1px solid var(--line);margin:2px 4px 2px 0;color:var(--dim)}
.chip.ok{color:var(--green);border-color:rgba(63,185,106,.4)}
.chip.bad{color:var(--red);border-color:rgba(224,86,62,.45)}
.chip.warn{color:var(--amber);border-color:rgba(224,169,62,.45)}
.deliv-link{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:11.5px;font-weight:600;
  background:rgba(79,142,247,.12);border:1px solid rgba(79,142,247,.35);color:var(--blue);text-decoration:none;transition:.15s}
.deliv-link:hover{background:rgba(79,142,247,.22)}
.deliv-link svg{width:11px;height:11px;flex-shrink:0}
.inject-panel{background:var(--card2);border:1px solid var(--line);border-radius:9px;padding:12px;margin-top:10px}
.inject-panel h4{font-size:12.5px;color:var(--dim);font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em}
textarea{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:8px;color:var(--txt);padding:9px 11px;font-size:13.5px;
  font-family:inherit;resize:vertical;min-height:72px;margin-top:0}
textarea:focus{outline:none;border-color:var(--blue)}
button{background:var(--blue);border:0;color:#fff;border-radius:8px;padding:8px 14px;font-size:13.5px;font-weight:600;cursor:pointer;transition:.15s}
button:active{opacity:.7}
button.opt{background:var(--card);border:1px solid var(--blue);color:var(--blue);margin:4px 6px 4px 0;padding:7px 12px}
button.opt:hover{background:rgba(79,142,247,.1)}
button.ghost{background:transparent;border:1px solid var(--line);color:var(--dim);font-weight:500}
button.ghost:hover{border-color:var(--txt);color:var(--txt)}
button.sm{padding:5px 10px;font-size:12.5px}
.row{display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap}
.sla{font-weight:700}.sla.late{color:var(--red)}.sla.soon{color:var(--amber)}.sla.fine{color:var(--green)}
a{color:var(--blue);text-decoration:none}a:hover{text-decoration:underline}
.tl{border-left:2px solid var(--line);margin-left:4px;padding-left:14px}
.tl div{margin-bottom:10px;font-size:13px}
.tl time{color:var(--dim);font-size:11.5px;display:block;margin-bottom:1px}
.tl .inject-event{color:var(--purple);font-weight:500}
.empty{color:var(--dim);padding:28px;text-align:center;font-size:13.5px}
#login{max-width:340px;margin:18vh auto;text-align:center}
pre{white-space:pre-wrap;font-size:12.5px;color:var(--dim);background:var(--bg);border-radius:7px;padding:10px;margin-top:6px;max-height:260px;overflow:auto}
.kv{font-size:13px;margin:4px 0;line-height:1.4}.kv b{color:var(--dim);font-weight:600;margin-right:6px}
.badge{display:inline-block;padding:1px 7px;border-radius:5px;font-size:11px;font-weight:600;margin-left:5px}
.badge.done{background:rgba(63,185,106,.15);color:var(--green)}
.badge.blocked{background:rgba(224,86,62,.15);color:var(--red)}
.badge.ready{background:rgba(79,142,247,.15);color:var(--blue)}
.badge.claimed{background:rgba(224,169,62,.15);color:var(--amber)}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--line);
  border-radius:10px;padding:10px 18px;font-size:13.5px;box-shadow:0 4px 20px rgba(0,0,0,.5);z-index:99;transition:.3s opacity}
.toast.hidden{opacity:0;pointer-events:none}

/* ── KANBAN ── */
.kanban-wrap{overflow-x:auto;padding-bottom:12px}
.kanban{display:flex;gap:12px;min-width:max-content;align-items:flex-start;padding:4px 0}
.kb-col{width:270px;flex-shrink:0;background:var(--card2);border:1px solid var(--line);border-radius:12px;display:flex;flex-direction:column}
.kb-col-hdr{padding:10px 13px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:6px}
.kb-col-hdr .title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.kb-col-hdr .count{background:var(--line);color:var(--dim);border-radius:99px;font-size:11px;font-weight:600;padding:1px 8px}
.kb-cards{padding:8px;min-height:80px;flex:1}
.kb-card{background:var(--card);border:1px solid var(--line);border-radius:9px;padding:10px 12px;margin-bottom:7px;cursor:pointer;transition:.15s border-color}
.kb-card:hover{border-color:var(--blue)}
.kb-card:last-child{margin-bottom:0}
.kb-card .title{font-size:12.5px;font-weight:600;line-height:1.35;margin-bottom:5px}
.kb-card .info{color:var(--dim);font-size:11.5px;display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.kb-card .deliv-badge{margin-top:6px}
.kb-empty{color:var(--dim);font-size:12px;text-align:center;padding:16px 8px;opacity:.6}
/* identity line — external_id is the stable handle agents address tasks by */
.kb-card .kb-id{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px;font-weight:600;line-height:1.35;margin-bottom:4px;display:flex;align-items:center;gap:6px;word-break:break-all}
.kb-card .kb-spec{color:var(--dim);font-size:11.5px;line-height:1.4;margin-bottom:7px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.kb-super{font-size:10px;color:var(--purple);margin-bottom:4px;font-family:ui-monospace,Menlo,monospace}
/* time rail — deadline, lease countdown, staleness */
.kb-rail{display:flex;gap:9px;flex-wrap:wrap;font-size:11px;margin-bottom:6px;align-items:center}
.kb-rail .t{display:inline-flex;align-items:center;gap:3px;color:var(--dim);white-space:nowrap}
.kb-rail .t.late{color:var(--red);font-weight:600}
.kb-rail .t.soon{color:var(--amber);font-weight:600}
/* facts: type · exit-gate target · owner */
.kb-facts{color:var(--dim);font-size:11px;margin-bottom:6px}
.kb-facts b{font-weight:600}
/* capability chips — the predicate an agent matches on to claim */
.caps{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px}
.cap{background:var(--line);color:var(--dim);border-radius:4px;font-size:10px;padding:1px 5px;font-family:ui-monospace,Menlo,monospace}
/* blocked-on-human banner */
.kb-block{background:rgba(224,86,62,.12);border:1px solid rgba(224,86,62,.3);color:var(--red);border-radius:6px;padding:5px 7px;font-size:11px;margin-bottom:6px;line-height:1.4}
.kb-block a{color:var(--red);font-weight:600}
.kb-foot{display:flex;align-items:center;gap:6px;margin-top:7px;padding-top:7px;border-top:1px solid var(--line)}
.kb-uuid{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:var(--dim);cursor:pointer;opacity:.7}
.kb-uuid:hover{opacity:1;color:var(--blue)}
.kb-act{margin-left:auto;background:none;border:1px solid var(--line);color:var(--dim);border-radius:5px;font-size:10.5px;padding:2px 7px;cursor:pointer}
.kb-act:hover{border-color:var(--blue);color:var(--blue)}
.kb-card.is-test{opacity:.55;border-style:dashed}
.testbtn{background:none;border:1px solid var(--line);color:var(--dim);border-radius:6px;font-size:11px;padding:3px 9px;cursor:pointer}
.testbtn:hover{border-color:var(--amber);color:var(--amber)}
.testbtn.on{border-color:var(--amber);color:var(--amber)}
/* column accent colours */
.kb-col.col-blocked .kb-col-hdr .title{color:var(--red)}
.kb-col.col-blocked{border-color:rgba(224,86,62,.25)}
.kb-col.col-ready .kb-col-hdr .title{color:var(--blue)}
.kb-col.col-ready{border-color:rgba(79,142,247,.25)}
.kb-col.col-in_production .kb-col-hdr .title{color:var(--amber)}
.kb-col.col-in_production{border-color:rgba(224,169,62,.25)}
.kb-col.col-done .kb-col-hdr .title{color:var(--green)}
.kb-col.col-done{border-color:rgba(63,185,106,.2)}
.kb-col.col-queued .kb-col-hdr .title{color:var(--purple)}
.kb-meta-bar{padding:10px 0 6px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
</style></head><body>
<header>
  <h1>🦴 Backbone</h1>
  <nav>
    <a href="#decisions" id="n-decisions">Decisions</a>
    <a href="#board" id="n-board">Board</a>
    <a href="#pulse" id="n-pulse">Pulse</a>
  </nav>
  <span id="who"></span>
</header>
<main id="app"></main>
<div class="toast hidden" id="toast"></div>
<script>
var BASE='https://nkpmzpttlajqjykzhmoc.supabase.co/functions/v1/board';
var ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5rcG16cHR0bGFqcWp5a3pobW9jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMjE2ODgsImV4cCI6MjA5NjY5NzY4OH0.g6VapldtI1Moo2IlNhSJ9tCgrxB6f2ZGA5mEFrXAk90';
var qs=new URLSearchParams(location.search);
if(qs.get('token')){localStorage.setItem('bb_token',qs.get('token'));history.replaceState(null,'',location.pathname+location.hash);}
var TOKEN=localStorage.getItem('bb_token')||'';

function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function api(action,params){
  return fetch(BASE,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+ANON},
    body:JSON.stringify(Object.assign({token:TOKEN,action:action},params||{}))})
  .then(function(r){return r.json().then(function(j){if(!r.ok)throw new Error(j.error||r.status);return j;});});
}
function ago(h){if(h==null)return'';if(h<1)return Math.round(h*60)+'m';if(h<48)return Math.round(h)+'h';return Math.round(h/24)+'d';}
function fmtTs(t){if(!t)return'';var d=new Date(t);return d.toLocaleString([],{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});}
function setNav(v){['decisions','board','pulse'].forEach(function(n){var el=document.getElementById('n-'+n);if(el)el.className=(v===n)?'on':'';});}
function show(html){document.getElementById('app').innerHTML=html;}
function toast(msg,ok){var el=document.getElementById('toast');el.textContent=msg;el.className='toast'+(ok===false?' bad':'');setTimeout(function(){el.className='toast hidden';},3000);}

var ARROW_SVG='<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 6h9M7 3l3 3-3 3"/></svg>';
var EXT_SVG='<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M5 2H2v8h8V7M7 1h4v4M7 5l4-4"/></svg>';
function delivBadge(url,label){
  if(!url)return'';
  return'<a class="deliv-link" href="'+esc(url)+'" target="_blank" onclick="event.stopPropagation()">'+EXT_SVG+' '+esc(label||'Open deliverable')+'</a>';
}
function stateBadge(s){
  var m={done:'done',blocked:'blocked',ready:'ready',in_production:'claimed'};
  var k=m[s]||'';return k?'<span class="badge '+k+'">'+esc(s)+'</span>':'<span style="color:var(--dim);font-size:12px">'+esc(s)+'</span>';
}
function priorityDot(p){return'<span class="dot p-'+esc(p)+'"></span>';}

/* ── task card (list view, used in task detail) ── */
function taskRow(t,delivMap){
  var deliv=delivMap&&delivMap[t.id];
  return '<div class="card linked" onclick="location.hash=\'task/'+t.id+'\'">'+
  '<h3>'+priorityDot(t.priority)+esc((t.deliverable_spec||'').slice(0,120)+(t.deliverable_spec&&t.deliverable_spec.length>120?'…':''))+stateBadge(t.state)+'</h3>'+
  '<div class="meta"><span>'+esc(t.type)+'</span>'+(t.claimed_by?'<span>'+esc(t.claimed_by)+'</span>':'<span>unclaimed</span>')+(t.deadline?'<span>due '+fmtTs(t.deadline)+'</span>':'')+(t.external_id?'<span style="opacity:.6">'+esc(t.external_id)+'</span>':'')+'</div>'+
  (deliv?'<div style="margin-top:7px">'+delivBadge(deliv.drive_url||null,deliv.workspace_path?'📄 '+deliv.workspace_path:null)+'</div>':'')+
  '</div>';
}

/* ── kanban card ──
   AI-first: the card leads with the machine-addressable identity (external_id),
   the claim predicate (required_capabilities) and the Exit Gate contract
   (output_location). Humans get exactly two levers — inject context, resolve a
   blocking decision — because those are the only two things an agent cannot do
   for itself. */
function isTestRow(t){
  return (t.external_id||'').indexOf('test-')===0||(t.deliverable_spec||'').indexOf('TEST')===0;
}
/* signed hours from now; negative = in the past */
function hoursUntil(ts){return ts?(new Date(ts).getTime()-Date.now())/3600000:null;}
function dur(h){h=Math.abs(h);return h<1?Math.round(h*60)+'m':(h<48?Math.round(h)+'h':Math.round(h/24)+'d');}
function urg(h,soonAt){return h<0?'late':(h<(soonAt==null?6:soonAt)?'soon':'');}
function copyId(id){
  if(navigator.clipboard&&navigator.clipboard.writeText)
    navigator.clipboard.writeText(id).then(function(){toast('Task UUID copied ✓',true);},function(){toast('Copy failed',false);});
  else toast(id,true);
}

function kbCard(t,delivMap,decByTask){
  var deliv=delivMap&&delivMap[t.id];
  var dec=decByTask&&decByTask[t.id];
  var ident=t.external_id||('task '+t.id.slice(0,8));
  var spec=(t.deliverable_spec||'').replace(/\s+/g,' ').trim();

  /* time rail: deadline, lease countdown, staleness.
     Terminal tasks carry no urgency — a delivered task cannot be overdue, and
     its lease is long gone. Showing red on the Done column is pure alarm noise. */
  var terminal=(t.state==='done');
  var rail='';
  var dh=hoursUntil(t.deadline);
  if(dh!=null&&!terminal)rail+='<span class="t '+urg(dh)+'">◷ '+(dh<0?dur(dh)+' overdue':'due in '+dur(dh))+'</span>';
  var lh=hoursUntil(t.lease_expires_at);
  if(lh!=null&&!terminal)rail+='<span class="t '+(lh<0?'late':urg(lh,1))+'">⚑ '+(lh<0?'lease expired':'lease '+dur(lh))+'</span>';
  if(!t.claimed_by&&!terminal){
    var age=hoursUntil(t.created_at);            /* negative: created in the past */
    if(age!=null&&age<-168)rail+='<span class="t soon">⧗ idle '+dur(age)+'</span>';
  }

  var h='<div class="kb-card'+(isTestRow(t)?' is-test':'')+'" onclick="location.hash=\'task/'+t.id+'\'">';
  if(t.supersedes_id)h+='<div class="kb-super">⤿ supersedes '+esc(t.supersedes_id.slice(0,8))+'</div>';
  h+='<div class="kb-id">'+priorityDot(t.priority)+esc(ident)+'</div>';
  if(spec)h+='<div class="kb-spec">'+esc(spec.slice(0,110))+(spec.length>110?'…':'')+'</div>';
  if(rail)h+='<div class="kb-rail">'+rail+'</div>';
  h+='<div class="kb-facts">'+esc(t.type)+' · <b>→'+esc(t.output_location||'?')+'</b> · '+
     (t.claimed_by?'<b style="color:var(--amber)">'+esc(t.claimed_by)+'</b>'
                  :'<b style="color:var(--blue)">unclaimed</b>')+'</div>';
  if((t.required_capabilities||[]).length)
    h+='<div class="caps">'+t.required_capabilities.map(function(c){return'<span class="cap">'+esc(c)+'</span>';}).join('')+'</div>';
  if(dec){
    var sla=dec.d.sla_remaining_hours;
    h+='<div class="kb-block">⚠ awaiting <b>'+esc(dec.approver)+'</b> · '+
       (dec.d.escalated?'ESCALATED':(sla<0?Math.abs(Math.round(sla))+'h over SLA':Math.round(sla)+'h SLA'))+
       '<br><a href="#decisions" onclick="event.stopPropagation()">'+esc((dec.d.question||'').slice(0,60))+'</a></div>';
  }
  if(deliv&&(deliv.drive_url||deliv.workspace_path))
    h+='<div class="deliv-badge">'+delivBadge(deliv.drive_url||null,deliv.workspace_path?'📄 '+deliv.workspace_path.split('/').pop():null)+'</div>';
  h+='<div class="kb-foot">'+
     '<span class="kb-uuid" title="Copy task UUID" onclick="event.stopPropagation();copyId(\''+t.id+'\')">⧉ '+esc(t.id.slice(0,8))+'</span>'+
     '<button class="kb-act" onclick="event.stopPropagation();openInject(\''+t.id+'\')">+ context</button>'+
     '</div>';
  return h+'</div>';
}

/* ── decision card ── */
function decisionCard(d,approver,viewer){
  var sla=d.sla_remaining_hours,cls=d.escalated||sla<0?'late':(sla<6?'soon':'fine');
  var h='<div class="card"><h3>'+esc(d.question)+'</h3>'+
  '<div class="meta"><span>for <b>'+esc(approver)+'</b></span><span>from '+esc(d.opened_by)+'</span>'+
  '<span>open '+ago(d.age_hours)+'</span><span class="sla '+cls+'">'+
  (d.escalated?'ESCALATED':(sla<0?Math.abs(Math.round(sla))+'h over SLA':Math.round(sla)+'h left'))+'</span></div>';
  if(d.artifact_url)h+='<div style="margin-top:8px">'+delivBadge(d.artifact_url,'Review artifact')+'</div>';
  if(d.default_action)h+='<div class="kv" style="margin-top:6px"><b>default</b>'+esc(d.default_action)+'</div>';
  if(d.blocking_task_id)h+='<div class="kv"><b>blocks task</b><a href="#task/'+d.blocking_task_id+'">'+d.blocking_task_id.slice(0,8)+'… ↗</a></div>';
  if(approver===viewer){
    if(d.options&&d.options.length)h+='<div style="margin-top:8px">'+d.options.map(function(o){
      return'<button class="opt" onclick="resolveD(\''+d.id+'\',this.dataset.label)" data-label="'+esc(o.label||o)+'">'+esc(o.label||o)+'</button>';}).join('')+'</div>';
    h+='<textarea id="r-'+d.id+'" placeholder="or type your resolution…" style="margin-top:8px"></textarea>'+
    '<div class="row"><button onclick="resolveD(\''+d.id+'\',document.getElementById(\'r-'+d.id+'\').value)">Resolve</button>'+
    (d.blocking_task_id?'<button class="ghost sm" onclick="openInject(\''+d.blocking_task_id+'\')">Inject context into task</button>':'')+
    '</div>';
  }
  return h+'</div>';
}
function resolveD(id,resolution){
  resolution=(resolution||'').trim();if(!resolution){alert('Type or pick a resolution first.');return;}
  api('resolve',{decision_id:id,resolution:resolution}).then(function(){toast('Decision resolved ✓',true);render();}).catch(function(e){alert(e.message);});
}

var _injectTarget=null;
function openInject(taskId){
  _injectTarget=taskId;
  var el=document.getElementById('inject-panel-global');
  if(el){el.style.display='block';el.scrollIntoView({behavior:'smooth',block:'center'});}
  else{location.hash='task/'+taskId;}
}
function doInject(taskId,textareaId){
  var note=(document.getElementById(textareaId).value||'').trim();
  if(!note){alert('Write a note or context first.');return;}
  api('inject',{task_id:taskId,note:note}).then(function(){
    document.getElementById(textareaId).value='';
    toast('Context injected — agents will see it on next board_query ✓',true);
    render();
  }).catch(function(e){alert(e.message);});
}

/* ── views ── */
function loginView(){
  show('<div id="login" class="card"><h3>Backbone board</h3><p class="meta" style="justify-content:center;margin:8px 0 12px">Paste your access token to continue</p>'+
  '<textarea id="tok" placeholder="access token" style="min-height:54px"></textarea><div class="row" style="justify-content:center;margin-top:10px"><button onclick="saveTok()">Enter</button></div></div>');
}
function saveTok(){TOKEN=(document.getElementById('tok').value||'').trim();localStorage.setItem('bb_token',TOKEN);render();}

function decisionsView(){
  api('board').then(function(r){
    document.getElementById('who').textContent=r.viewer;
    var d=r.board.decisions_by_approver||{},me=d[r.viewer]||[],h='';
    h+='<div class="sec">Your queue ('+me.length+')</div>';
    h+=me.length?me.map(function(x){return decisionCard(x,r.viewer,r.viewer);}).join(''):'<div class="empty">Nothing waiting on you ✓</div>';
    var others=Object.keys(d).filter(function(k){return k!==r.viewer;});
    others.forEach(function(k){
      h+='<div class="sec">Waiting on '+esc(k)+' ('+d[k].length+')</div>'+
      d[k].map(function(x){return decisionCard(x,k,r.viewer);}).join('');
    });
    show(h);
  }).catch(errView);
}

/* ── KANBAN BOARD VIEW ── */
var SHOW_TEST=false;
function toggleTest(){SHOW_TEST=!SHOW_TEST;render();}

var KB_COLS=[
  {key:'blocked',  label:'Blocked'},
  {key:'ready',    label:'Ready'},
  {key:'in_production', label:'In Production'},
  {key:'queued',   label:'Queued'},
  {key:'compiled', label:'Compiled'},
  {key:'done',     label:'Done'},
  {key:'demo',     label:'Demo'},
];

function boardView(){
  Promise.all([api('board'), api('pulse').catch(function(){return {pulse:{completed_deliverables:[]}};})])
  .then(function(results){
    var r=results[0], pr=results[1];
    document.getElementById('who').textContent=r.viewer;
    var b=r.board;

    // build deliverable map from pulse
    var delivMap={};
    (pr.pulse.completed_deliverables||[]).forEach(function(d){if(d.task_id)delivMap[d.task_id]=d;});

    var h='';

    // meta bar: cron health + open decisions alert + open requests
    h+='<div class="kb-meta-bar">';
    var cronBad=(b.cron_health||[]).filter(function(c){return c.health!=='ok';});
    var totalDec=Object.values(b.decisions_by_approver||{}).reduce(function(s,a){return s+a.length;},0);
    var totalReq=(b.open_requests||[]).length;
    if(totalDec>0)h+='<a href="#decisions"><span class="chip warn">⚡ '+totalDec+' decision'+(totalDec>1?'s':'')+' waiting</span></a>';
    if(totalReq>0)h+='<span class="chip warn">📥 '+totalReq+' open request'+(totalReq>1?'s':'')+'</span>';
    cronBad.forEach(function(c){h+='<span class="chip bad">'+esc(c.id)+' · '+esc(c.health)+'</span>';});
    if(!totalDec&&!totalReq&&!cronBad.length)h+='<span class="chip ok">All systems clear</span>';
    h+='</div>';

    // programs
    if((b.programs||[]).filter(function(p){return!p.name.startsWith('TEST');}).length){
      h+='<div class="sec">Programs</div><div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">';
      (b.programs||[]).filter(function(p){return!p.name.startsWith('TEST');}).forEach(function(p){
        h+='<span class="chip">'+esc(p.name)+' · '+p.open_tasks+' tasks</span>';
      });
      h+='</div>';
    }

    // kanban
    var tasksByState=b.tasks_by_state||{};

    // join open decisions onto the tasks they block, so a blocked card says who owes what
    var decByTask={};
    Object.keys(b.decisions_by_approver||{}).forEach(function(ap){
      (b.decisions_by_approver[ap]||[]).forEach(function(d){
        if(d.blocking_task_id)decByTask[d.blocking_task_id]={d:d,approver:ap};
      });
    });

    var testCount=0;
    KB_COLS.forEach(function(col){
      (tasksByState[col.key]||[]).forEach(function(t){if(isTestRow(t))testCount++;});
    });
    if(testCount)
      h+='<div class="kb-meta-bar"><button class="testbtn'+(SHOW_TEST?' on':'')+'" onclick="toggleTest()">'+
         (SHOW_TEST?'Hide':'Show')+' '+testCount+' test row'+(testCount===1?'':'s')+'</button></div>';

    h+='<div class="kanban-wrap"><div class="kanban">';
    KB_COLS.forEach(function(col){
      var tasks=(tasksByState[col.key]||[]);
      if(!SHOW_TEST)tasks=tasks.filter(function(t){return !isTestRow(t);});
      var cards=tasks.map(function(t){return kbCard(t,delivMap,decByTask);}).join('');
      h+='<div class="kb-col col-'+col.key+'">';
      h+='<div class="kb-col-hdr"><span class="title">'+esc(col.label)+'</span><span class="count">'+tasks.length+'</span></div>';
      h+='<div class="kb-cards">'+(cards||'<div class="kb-empty">Empty</div>')+'</div>';
      h+='</div>';
    });
    h+='</div></div>';

    show(h);
  }).catch(errView);
}

function pulseView(){
  api('pulse').then(function(r){
    document.getElementById('who').textContent=r.viewer;
    var p=r.pulse,h='';
    var evts=p.events||[];
    if(!evts.length){h='<div class="empty">No activity yet today.</div>';}
    else{
      h='<div class="tl">';
      evts.slice().reverse().forEach(function(e){
        var cls=e.kind==='inject'?'inject-event':'';
        h+='<div><time>'+fmtTs(e.created_at)+'</time><span class="'+cls+'">'+esc(e.summary||e.kind)+'</span></div>';
      });
      h+='</div>';
    }
    var delivs=p.completed_deliverables||[];
    if(delivs.length){
      h+='<div class="sec">Shipped today ('+delivs.length+')</div>';
      delivs.forEach(function(d){
        h+='<div class="card"><h3>'+esc(d.task_external_id||d.task_id.slice(0,12))+'</h3>'+
        '<div class="meta"><span>'+esc(d.produced_by)+'</span><span>'+fmtTs(d.completed_at)+'</span></div>'+
        (d.drive_url?'<div style="margin-top:7px">'+delivBadge(d.drive_url,'Open in Drive')+'</div>':'')+
        (d.workspace_path?'<div style="margin-top:7px"><span class="deliv-link">📄 '+esc(d.workspace_path)+'</span></div>':'')+
        '</div>';
      });
    }
    show(h);
  }).catch(errView);
}

function taskView(id){
  api('task',{task_id:id}).then(function(r){
    document.getElementById('who').textContent=r.viewer;
    var t=r.task,h='';
    h+='<div style="margin:8px 0 14px"><a href="#board" style="color:var(--dim);font-size:13px">← Board</a></div>';
    h+='<div class="card">'+
    '<h3>'+priorityDot(t.priority)+esc(t.deliverable_spec||'')+stateBadge(t.state)+'</h3>';
    var fields=[['type',t.type],['claimed by',t.claimed_by],
     ['lease expires',t.lease_expires_at?fmtTs(t.lease_expires_at):null],
     ['deadline',t.deadline?fmtTs(t.deadline):null],
     ['output',t.output_location],['created by',t.created_by],
     ['external id',t.external_id],['wiki page',t.wiki_page],['skill route',t.skill_route]];
    fields.forEach(function(kv){if(kv[1])h+='<div class="kv"><b>'+kv[0]+'</b>'+esc(kv[1])+'</div>';});
    if(t.context)h+='<div class="kv"><b>context</b><span style="color:var(--txt)">'+esc(t.context)+'</span></div>';
    if(t.supersedes_id)h+='<div class="kv"><b>supersedes</b><a href="#task/'+t.supersedes_id+'">'+t.supersedes_id.slice(0,8)+'…</a></div>';
    if(t.superseded_by)h+='<div class="kv"><b>superseded by</b><a href="#task/'+t.superseded_by+'">'+t.superseded_by.slice(0,8)+'…</a></div>';
    h+='</div>';

    if((r.deliverables||[]).length){
      h+='<div class="sec">Deliverables ('+r.deliverables.length+')</div>';
      r.deliverables.forEach(function(d){
        h+='<div class="card"><div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">'+
        '<span style="font-size:13px;color:var(--dim)">v'+d.version+' · '+esc(d.produced_by)+' · '+fmtTs(d.completed_at)+'</span>';
        if(d.drive_url)h+=delivBadge(d.drive_url,'Open in Drive / Docs');
        if(d.workspace_path)h+='<span class="deliv-link">📄 '+esc(d.workspace_path)+'</span>';
        h+='</div>';
        if(d.inline_content)h+='<pre>'+esc(d.inline_content.slice(0,1200))+(d.inline_content.length>1200?'\n…[truncated]':'')+'</pre>';
        h+='</div>';
      });
    }

    // inject panel
    h+='<div class="sec">Inject context</div>'+
    '<div class="inject-panel" id="inject-panel-global" style="display:block">'+
    '<h4>Add context for the agent</h4>'+
    '<textarea id="inj-txt-'+t.id+'" placeholder="Type a correction, clarification, or additional context…"></textarea>'+
    '<div class="row"><button onclick="doInject(\''+t.id+'\',\'inj-txt-'+t.id+'\')">Inject</button></div>'+
    '</div>';

    // timeline
    if((r.events||[]).length){
      h+='<div class="sec">Timeline ('+r.events.length+')</div><div class="tl">';
      r.events.slice().reverse().forEach(function(e){
        var cls=e.kind==='inject'?'inject-event':'';
        h+='<div><time>'+fmtTs(e.created_at)+' · '+esc(e.actor||'')+'</time><span class="'+cls+'">'+esc(e.summary||e.kind)+'</span>';
        if(e.payload_text)h+='<pre>'+esc(e.payload_text.slice(0,400))+'</pre>';
        h+='</div>';
      });
      h+='</div>';
    }
    show(h);
  }).catch(errView);
}

function errView(e){
  if(e&&e.message&&e.message.toLowerCase().includes('token')){TOKEN='';localStorage.removeItem('bb_token');loginView();return;}
  show('<div class="empty">Error: '+esc(e&&e.message||'unknown')+'<br><br><button onclick="render()">Retry</button></div>');
}

function render(){
  var h=location.hash;
  if(!TOKEN){loginView();return;}
  if(!h||h==='#'||h==='#decisions'){setNav('decisions');decisionsView();}
  else if(h==='#board'){setNav('board');boardView();}
  else if(h==='#pulse'){setNav('pulse');pulseView();}
  else if(h.startsWith('#task/')){setNav('board');taskView(h.slice(6));}
  else{setNav('board');boardView();}
}

window.addEventListener('hashchange',render);
render();
</script></body></html>
